        }
        .btn-primary:hover {
            background: #ff6b4a;
        }
        .btn-secondary {
            background: var(--accent2);
            color: #fff;
        }
        .btn-secondary:hover {
            background: #6bb8ff;
        }
        .btn-ghost {
            background: transparent;
            color: #aab;
            border: 1px solid var(--border);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        #joinError {
            color: #ff5555;
            font-size: 13px;
            margin-top: 4px;
        }
        #playerList {
            text-align: left;
            font-size: 13px;
            max-height: 150px;
            overflow-y: auto;
            margin: 8px 0;
        }
        #lobbyStatus {
            font-size: 12px;
            color: #8a8;
            margin-top: 6px;
        }
        #roomDisplay {
            font-weight: bold;
            font-size: 16px;
            color: var(--accent2);
            margin-bottom: 6px;
        }
        #tutorialOverlay {
            pointer-events: none;
            background: transparent;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 40px;
        }
        #tutorialText {
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 10px 22px;
            border-radius: 20px;
            font-size: 15px;
            letter-spacing: 0.3px;
            animation: fadeInOut 4s ease-in-out forwards;
        }
        @keyframes fadeInOut {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            15% {
                opacity: 1;
                transform: translateY(0);
            }
            75% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translateY(-10px);
            }
        }
        #winnerText {
            font-size: 24px;
            font-weight: bold;
            color: #ffd700;
        }
        #winnerSub {
            color: #ccc;
            margin-bottom: 12px;
        }

        /* Responsive */
        @media (max-width: 600px) {
            #hud {
                font-size: 11px;
                padding: 6px 10px;
                gap: 6px;
            }
            #hudRoomCode {
                font-size: 13px;
            }
            .overlay-card {
                padding: 18px 14px;
            }
            .btn {
                padding: 10px 18px;
                font-size: 13px;
            }
            #tutorialText {
                font-size: 13px;
                padding: 8px 16px;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- HUD -->
        <div id="hud">
            <span id="hudRoomCode">Room: ----</span>
            <span id="hostBadge" class="hidden">HOST</span>
            <span id="hudScores">Scores</span>
            <span id="hudStatus">Ready</span>
        </div>

        <!-- Arena -->
        <div id="arenaWrapper">
            <canvas id="gameCanvas"></canvas>
        </div>

        <!-- Lobby Overlay -->
        <div id="lobbyOverlay" class="overlay">
            <div class="overlay-card">
                <div id="lobbyMain">
                    <h2>🎯 Corner Rush</h2>
                    <h3>Hot Potato · 2-4 Players</h3>
                    <p>Drag to slingshot · Pass the bomb · Last one standing wins!</p>
                    <button id="createBtn" class="btn btn-primary">✨ Create Room</button>
                    <button id="joinBtn" class="btn btn-secondary">🔗 Join Room</button>
                </div>
                <div id="lobbyRoom" class="hidden">
                    <h3>Join a Room</h3>
                    <input type="text" id="roomCodeInput" inputmode="numeric" pattern="[0-9]*" maxlength="4" placeholder="0000">
                    <div id="joinError" class="hidden"></div>
                    <button id="joinConfirmBtn" class="btn btn-primary">Join</button>
                    <button id="cancelJoinBtn" class="btn btn-ghost">Back</button>
                </div>
                <div id="roomDisplay" style="margin-top:10px;"></div>
                <div id="playerList"></div>
                <div id="lobbyStatus">Initializing...</div>
                <button id="startBtn" class="btn btn-primary hidden" style="margin-top:8px;">🚀 Start Game</button>
            </div>
        </div>

        <!-- Tutorial -->
        <div id="tutorialOverlay" class="overlay hidden">
            <span id="tutorialText">🐍 Drag to slingshot in the opposite direction!</span>
        </div>

        <!-- Winner -->
        <div id="winnerOverlay" class="overlay hidden">
            <div class="overlay-card">
                <div id="winnerText">🏆 Winner!</div>
                <div id="winnerSub"></div>
                <button id="playAgainBtn" class="btn btn-primary">Play Again</button>
            </div>
        </div>
    </div>
</body>
</html>
