<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Corner Rush</title>
  <!--
    Firebase setup:
    1. Create a Firebase project.
    2. Enable Anonymous Authentication in Authentication > Sign-in method.
    3. Create a Realtime Database.
    4. Replace the firebaseConfig placeholder below in the JavaScript.
    5. For early testing, use permissive database rules. Tighten rules before public release.
  -->
  <style>
    :root {
      color-scheme: dark;
      --bg: #111318;
      --panel: #1c2028;
      --panel-2: #242a34;
      --text: #f4f7fb;
      --muted: #aab3c2;
      --line: #3a4352;
      --accent: #71d4ff;
      --danger: #ff6377;
      --good: #80e18d;
      --warn: #ffd166;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: radial-gradient(circle at top, #202737 0, var(--bg) 58%);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }

    body {
      min-height: 100dvh;
      display: flex;
      justify-content: center;
    }

    button, input {
      font: inherit;
    }

    button {
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--text);
      padding: 0.65rem 0.9rem;
      border-radius: 8px;
      cursor: pointer;
    }

    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #071016;
      font-weight: 700;
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    input {
      width: 100%;
      min-width: 0;
      border: 1px solid var(--line);
      background: #10141b;
      color: var(--text);
      padding: 0.65rem 0.75rem;
      border-radius: 8px;
      text-transform: uppercase;
    }

    .app {
      width: min(100vw, 1240px);
      height: 100dvh;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      gap: clamp(8px, 1.5vmin, 16px);
      padding: clamp(8px, 1.8vmin, 18px);
    }

    .hud {
      display: grid;
      grid-template-columns: minmax(190px, 0.8fr) minmax(220px, 1.4fr) minmax(180px, 0.8fr);
      gap: 10px;
      align-items: stretch;
    }

    .panel {
      border: 1px solid var(--line);
      background: color-mix(in srgb, var(--panel) 92%, transparent);
      border-radius: 8px;
      padding: 10px;
    }

    .room-line, .status-line {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-width: 0;
    }

    .label {
      color: var(--muted);
      font-size: 0.78rem;
      line-height: 1.2;
    }

    .value {
      font-weight: 800;
      font-size: clamp(1rem, 2.2vmin, 1.55rem);
      letter-spacing: 0.08em;
      white-space: nowrap;
    }

    .scores {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .score {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px;
      min-width: 0;
      background: rgba(255,255,255,0.035);
    }

    .score .name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 0.85rem;
      color: var(--muted);
    }

    .score .points {
      font-weight: 800;
      font-size: 1.25rem;
    }

    .score.me {
      border-color: var(--accent);
    }

    .stage {
      min-height: 0;
      display: grid;
      place-items: center;
      position: relative;
    }

    .arena-wrap {
      position: relative;
      width: min(100%, calc(100dvh - 178px), 980px);
      aspect-ratio: 1 / 1;
      min-width: min(100%, 260px);
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      border: clamp(4px, 0.8vmin, 8px) solid #d9e4f3;
      border-radius: 0;
      background: #181d25;
      touch-action: none;
      user-select: none;
    }

    .corner-tag {
      position: absolute;
      color: var(--muted);
      font-size: clamp(0.68rem, 1.8vmin, 0.88rem);
      max-width: 38%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      pointer-events: none;
    }

    .tag-0 { left: 0; top: -1.35rem; }
    .tag-1 { right: 0; top: -1.35rem; text-align: right; }
    .tag-2 { left: 0; bottom: -1.35rem; }
    .tag-3 { right: 0; bottom: -1.35rem; text-align: right; }

    .overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
      text-align: center;
      padding: 20px;
    }

    .overlay-card {
      pointer-events: auto;
      width: min(520px, 100%);
      border: 1px solid var(--line);
      background: rgba(20, 24, 31, 0.94);
      border-radius: 8px;
      padding: clamp(14px, 3vmin, 24px);
      box-shadow: 0 16px 48px rgba(0,0,0,0.35);
    }

    .overlay-card h1 {
      margin: 0 0 8px;
      font-size: clamp(1.6rem, 5vmin, 3rem);
    }

    .overlay-card p {
      margin: 8px 0;
      color: var(--muted);
    }

    .lobby-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    .join-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      margin-top: 10px;
    }

    .bottom {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .hint {
      color: var(--muted);
      font-size: 0.88rem;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 0.35rem 0.65rem;
      color: var(--muted);
      background: rgba(255,255,255,0.035);
      font-size: 0.82rem;
      white-space: nowrap;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--danger);
    }

    .dot.ok { background: var(--good); }

    @media (max-width: 760px) {
      .app {
        grid-template-rows: auto minmax(0, 1fr) auto;
      }

      .hud {
        grid-template-columns: 1fr;
      }

      .scores {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .arena-wrap {
        width: min(100%, calc(100dvh - 318px));
      }

      .bottom {
        grid-template-columns: 1fr;
      }

      .lobby-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 420px) {
      .app {
        padding: 6px;
      }

      .panel {
        padding: 8px;
      }

      .scores {
        gap: 6px;
      }

      .score {
        padding: 6px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="hud">
      <div class="panel">
        <div class="room-line">
          <div>
            <div class="label">Room</div>
            <div class="value" id="roomCode">----</div>
          </div>
          <div class="pill"><span class="dot" id="connDot"></span><span id="connText">Offline</span></div>
        </div>
      </div>
      <div class="panel">
        <div class="scores" id="scores"></div>
      </div>
      <div class="panel">
        <div class="status-line">
          <div>
            <div class="label">Role</div>
            <div id="roleText">Not joined</div>
          </div>
          <button id="startBtn" class="primary" disabled>Start</button>
        </div>
      </div>
    </section>

    <section class="stage">
      <div class="arena-wrap">
        <canvas id="game" aria-label="Corner Rush square arena"></canvas>
        <div class="corner-tag tag-0" id="tag0"></div>
        <div class="corner-tag tag-1" id="tag1"></div>
        <div class="corner-tag tag-2" id="tag2"></div>
        <div class="corner-tag tag-3" id="tag3"></div>
        <div class="overlay" id="overlay">
          <div class="overlay-card">
            <h1>Corner Rush</h1>
            <p>Online hot-potato dashing for 2-4 players.</p>
            <input id="nameInput" maxlength="14" placeholder="Player name" autocomplete="nickname">
            <div class="lobby-grid">
              <button id="createBtn" class="primary">Create room</button>
              <div class="join-row">
                <input id="joinInput" inputmode="numeric" maxlength="4" placeholder="1234">
                <button id="joinBtn">Join</button>
              </div>
            </div>
            <p id="overlayMsg">Drag inside the square, release, and dash in the opposite direction.</p>
          </div>
        </div>
      </div>
    </section>

    <section class="bottom">
      <div class="hint" id="hint">First load hint: drag to slingshot in the opposite direction. Longer drag means stronger dash.</div>
      <div class="pill" id="roundText">Waiting for room</div>
    </section>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
  <script>
    // ======================== TWEAKABLE GAME BALANCE CONFIG ========================
    const CONFIG = {
      FUSE_DURATION: 12,
      MIN_LOCKOUT: 0.5,
      CARRIER_LOCKOUT_BONUS: 0.3,
      MAX_DRAG_RADIUS_RATIO: 0.2,
      PLAYER_FRICTION: 0.955,
      BOX_FRICTION: 0.96,
      BOX_ANGULAR_FRICTION: 0.91,
      NEAR_ZERO_VELOCITY_THRESHOLD: 5,
      BOX_SIZE_RATIO: 0.06,
      PLAYER_RADIUS_RATIO: 0.025,
      ROUNDS_TO_WIN: 3,
      SYNC_RATE: 30,
      MAX_DASH_SPEED_MULTIPLIER: 1.4,
      BOX_CLUSTER_INSET_RATIO: 0.18,
      PLAYER_BOX_BRAKE: 0.42,
      BOX_PUSH_MULTIPLIER: 0.48,
      BOX_PLAYER_SEPARATION_SHARE: 0.35,
      BOX_TORQUE_MULTIPLIER: 10,
      MAX_PLAYER_SPEED_RATIO_PER_SECOND: 4.2,
      MAX_BOX_SPEED_RATIO_PER_SECOND: 2.2,
      MAX_BOX_ANGULAR_SPEED: 9,
      PHYSICS_SUBSTEPS: 5,
      COLLISION_PASSES: 3,
      PLAYER_RESTITUTION: 0.72,
      BOX_RESTITUTION: 0.25,
      PASS_GRACE_SECONDS: 0.45,
      COUNTDOWN_SECONDS: 3,
      ROUND_END_DELAY: 2.25,
      HOST_HEARTBEAT_MS: 1500,
      HOST_STALE_MS: 5500,
      INTERPOLATION: 0.28
    };
    // ==============================================================================

    const firebaseConfig = {
      apiKey: "AIzaSyBfOKGz06urUqutCnDUfy6P2hMswoBifq8",
      authDomain: "bomb-game-782c2.firebaseapp.com",
      databaseURL: "https://bomb-game-782c2-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "bomb-game-782c2",
      storageBucket: "bomb-game-782c2.firebasestorage.app",
      messagingSenderId: "984947565972",
      appId: "1:984947565972:web:486661db2f7dab317bdb81"
    };

    const USE_FIREBASE = !firebaseConfig.apiKey.includes("PASTE_");
    const COLORS = ["#71d4ff", "#ffcc66", "#a98bff", "#80e18d"];
    const SPAWNS = [
      { x: 0.08, y: 0.08 },
      { x: 0.92, y: 0.08 },
      { x: 0.08, y: 0.92 },
      { x: 0.92, y: 0.92 }
    ];

    const $ = (id) => document.getElementById(id);
    const canvas = $("game");
    const ctx = canvas.getContext("2d");
    const overlay = $("overlay");
    const overlayMsg = $("overlayMsg");
    const roomCodeEl = $("roomCode");
    const connDot = $("connDot");
    const connText = $("connText");
    const roleText = $("roleText");
    const startBtn = $("startBtn");
    const scoresEl = $("scores");
    const roundText = $("roundText");
    const tags = [$("tag0"), $("tag1"), $("tag2"), $("tag3")];

    let app = null;
    let auth = null;
    let db = null;
    let uid = "local-" + Math.random().toString(36).slice(2, 10);
    let roomCode = "";
    let roomRef = null;
    let playerRef = null;
    let stateRef = null;
    let hostRef = null;
    let presenceRef = null;
    let isHost = false;
    let localIndex = 0;
    let lastFrame = performance.now();
    let lastSync = 0;
    let lastHeartbeat = 0;
    let lastPassAt = 0;
    let drag = null;
    let arenaSize = 800;

    const game = emptyGame();
    const renderState = emptyGame();

    function emptyGame() {
      return {
        phase: "idle",
        round: 0,
        message: "Waiting for players",
        countdownEnd: 0,
        fuseEnd: 0,
        roundResumeAt: 0,
        winnerId: "",
        bombCarrierId: "",
        players: {},
        boxes: [],
        scores: {}
      };
    }

    function nowMs() {
      return Date.now();
    }

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function hypot(x, y) {
      return Math.hypot(x, y);
    }

    function speed(o) {
      return hypot(o.vx || 0, o.vy || 0);
    }

    function copyInto(target, source) {
      target.phase = source.phase || "idle";
      target.round = source.round || 0;
      target.message = source.message || "";
      target.countdownEnd = source.countdownEnd || 0;
      target.fuseEnd = source.fuseEnd || 0;
      target.roundResumeAt = source.roundResumeAt || 0;
      target.winnerId = source.winnerId || "";
      target.bombCarrierId = source.bombCarrierId || "";
      target.scores = source.scores || {};
      target.boxes = Array.isArray(source.boxes) ? source.boxes.map(b => ({ ...b })) : [];
      const nextPlayers = source.players || {};
      for (const id of Object.keys(target.players)) {
        if (!nextPlayers[id]) delete target.players[id];
      }
      for (const [id, p] of Object.entries(nextPlayers)) {
        target.players[id] = { ...(target.players[id] || {}), ...p };
      }
    }

    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();
      const dpr = Math.max(1, Math.min(window.devicePixelRatio || 1, 2));
      canvas.width = Math.max(1, Math.floor(rect.width * dpr));
      canvas.height = Math.max(1, Math.floor(rect.height * dpr));
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      arenaSize = rect.width;
    }

    function roomPath(code) {
      return "/rooms/" + code;
    }

    async function initFirebase() {
      if (!USE_FIREBASE) {
        setConnection(false, "Config needed");
        overlayMsg.textContent = "Paste your Firebase config into the HTML before using online rooms.";
        return false;
      }
      app = firebase.initializeApp(firebaseConfig);
      auth = firebase.auth();
      db = firebase.database();
      await auth.signInAnonymously();
      uid = auth.currentUser.uid;
      firebase.database().ref(".info/connected").on("value", (snap) => {
        setConnection(!!snap.val(), snap.val() ? "Connected" : "Reconnecting");
      });
      return true;
    }

    function setConnection(ok, text) {
      connDot.classList.toggle("ok", ok);
      connText.textContent = text;
    }

    function getPlayerName() {
      return ($("nameInput").value || "Player").trim().slice(0, 14) || "Player";
    }

    function makeCode() {
      return String(Math.floor(1000 + Math.random() * 9000));
    }

    async function createRoom() {
      if (!await initFirebase()) return;
      roomCode = makeCode();
      roomRef = db.ref(roomPath(roomCode));
      const initial = emptyGame();
      initial.createdAt = firebase.database.ServerValue.TIMESTAMP;
      initial.hostId = uid;
      initial.players = {};
      await roomRef.set(initial);
      await joinExistingRoom(roomCode, true);
    }

    async function joinExistingRoom(code, host) {
      if (!db && !await initFirebase()) return;
      roomCode = String(code).replace(/\D/g, "").slice(0, 4);
      if (roomCode.length !== 4) {
        overlayMsg.textContent = "Enter a 4-digit room code.";
        return;
      }
      roomRef = db.ref(roomPath(roomCode));
      stateRef = roomRef;
      hostRef = roomRef.child("hostId");
      playerRef = roomRef.child("players").child(uid);
      presenceRef = playerRef.child("connected");
      const snap = await roomRef.get();
      if (!snap.exists() && !host) {
        overlayMsg.textContent = "Room not found.";
        return;
      }
      const players = snap.child("players").val() || {};
      const used = Object.values(players).map(p => p.index);
      const index = [0, 1, 2, 3].find(i => !used.includes(i));
      if (index === undefined) {
        overlayMsg.textContent = "Room is full.";
        return;
      }
      localIndex = index;
      await playerRef.set({
        name: getPlayerName(),
        index,
        color: COLORS[index],
        connected: true,
        ready: true,
        joinedAt: firebase.database.ServerValue.TIMESTAMP,
        active: true,
        ghost: false,
        x: SPAWNS[index].x,
        y: SPAWNS[index].y,
        vx: 0,
        vy: 0,
        lastDashAt: 0
      });
      playerRef.onDisconnect().remove();
      roomRef.on("value", handleRoomUpdate);
      overlay.style.display = "none";
      roomCodeEl.textContent = roomCode;
      setConnection(true, "Connected");
    }

    function handleRoomUpdate(snap) {
      const data = snap.val();
      if (!data) return;
      copyInto(game, data);
      const players = game.players || {};
      const hostId = data.hostId || pickHostId(players);
      isHost = hostId === uid;
      if (!data.hostId && hostId && db) hostRef.set(hostId);
      const hostPlayer = players[hostId];
      if (!isHost && (!hostPlayer || !hostPlayer.connected || nowMs() - (data.hostHeartbeat || 0) > CONFIG.HOST_STALE_MS)) {
        const nextHost = pickHostId(players);
        if (nextHost === uid) hostRef.set(uid);
      }
      roleText.textContent = isHost ? "Host" : "Client";
      startBtn.disabled = !isHost || activeConnectedPlayers().length < 2 || game.phase === "countdown" || game.phase === "playing";
      updateHud();
    }

    function pickHostId(players) {
      return Object.entries(players || {})
        .filter(([, p]) => p.connected)
        .sort((a, b) => (a[1].joinedAt || 0) - (b[1].joinedAt || 0))[0]?.[0] || "";
    }

    function activeConnectedPlayers() {
      return Object.entries(game.players || {}).filter(([, p]) => p.connected);
    }

    function startMatchOrRound() {
      if (!isHost) return;
      const currentScores = game.scores || {};
      startRound(game.round + 1, currentScores);
    }

    function startRound(round, scores) {
      const ids = activeConnectedPlayers().slice(0, 4).map(([id]) => id);
      if (ids.length < 2) return;
      const players = {};
      ids.forEach((id, i) => {
        const base = game.players[id] || {};
        players[id] = {
          ...base,
          index: base.index ?? i,
          color: base.color || COLORS[i],
          active: true,
          ghost: false,
          x: SPAWNS[i].x,
          y: SPAWNS[i].y,
          vx: 0,
          vy: 0,
          lastDashAt: 0
        };
      });
      const bombCarrierId = ids[Math.floor(Math.random() * ids.length)];
      const next = {
        phase: "countdown",
        message: "Get ready",
        round,
        countdownEnd: nowMs() + CONFIG.COUNTDOWN_SECONDS * 1000,
        fuseEnd: 0,
        roundResumeAt: 0,
        winnerId: "",
        bombCarrierId,
        players,
        boxes: createBoxes(),
        scores,
        hostId: uid,
        hostHeartbeat: nowMs()
      };
      roomRef.update(next);
    }

    function createBoxes() {
      const s = CONFIG.BOX_SIZE_RATIO;
      const gap = s * 1.16;
      const inset = CONFIG.BOX_CLUSTER_INSET_RATIO;
      const far = 1 - inset - s;
      const nearL = inset + gap;
      const farL = far - gap;
      const points = [
        [inset, inset], [nearL, inset], [inset, nearL],
        [far, inset], [farL, inset], [far, nearL],
        [inset, far], [nearL, far], [inset, farL],
        [far, far], [farL, far], [far, farL]
      ];
      return points.map(([x, y], i) => ({ id: i, x, y, vx: 0, vy: 0, angle: 0, av: 0 }));
    }

    function hostStep(dt) {
      if (!isHost) return;
      const t = nowMs();
      if (t - lastHeartbeat > CONFIG.HOST_HEARTBEAT_MS) {
        lastHeartbeat = t;
        roomRef.update({ hostHeartbeat: t, hostId: uid });
      }

      if (game.phase === "countdown" && t >= game.countdownEnd) {
        game.phase = "playing";
        game.fuseEnd = t + CONFIG.FUSE_DURATION * 1000;
        game.message = "Run";
      }

      if (game.phase === "playing") {
        simulate(dt);
        if (t >= game.fuseEnd) explodeCarrier();
        const alive = Object.entries(game.players).filter(([, p]) => p.active && !p.ghost);
        if (alive.length <= 1) {
          const winnerId = alive[0]?.[0] || "";
          game.phase = "roundEnd";
          game.winnerId = winnerId;
          game.roundResumeAt = t + CONFIG.ROUND_END_DELAY * 1000;
          game.message = winnerId ? ((game.players[winnerId]?.name || "Player") + " wins the round") : "No winner";
          if (winnerId) game.scores[winnerId] = (game.scores[winnerId] || 0) + 1;
        }
      }

      if (game.phase === "roundEnd" && t >= game.roundResumeAt) {
        const matchWinner = Object.entries(game.scores || {}).find(([, score]) => score >= CONFIG.ROUNDS_TO_WIN)?.[0];
        if (matchWinner) {
          game.phase = "matchEnd";
          game.winnerId = matchWinner;
          game.message = (game.players[matchWinner]?.name || "Player") + " wins the match";
        } else {
          startRound(game.round + 1, game.scores || {});
          return;
        }
      }

      if (t - lastSync >= 1000 / CONFIG.SYNC_RATE) {
        lastSync = t;
        syncHostState();
      }
    }

    function simulate(dt) {
      const fastest = Math.max(
        ...Object.values(game.players || {}).map(p => speed(p)),
        ...(game.boxes || []).map(b => speed(b)),
        0
      );
      const maxStepDistance = Math.max(CONFIG.PLAYER_RADIUS_RATIO * 0.55, 0.006);
      const dynamicSteps = Math.ceil((fastest * dt) / maxStepDistance);
      const steps = clamp(dynamicSteps, 1, CONFIG.PHYSICS_SUBSTEPS);
      const stepDt = dt / steps;
      for (let i = 0; i < steps; i++) simulateStep(stepDt);
    }

    function simulateStep(dt) {
      const players = Object.entries(game.players);
      const boxes = game.boxes || [];
      const pr = CONFIG.PLAYER_RADIUS_RATIO;
      const bs = CONFIG.BOX_SIZE_RATIO;

      for (const [, p] of players) {
        if (!p.active || p.ghost) continue;
        p.x += (p.vx || 0) * dt;
        p.y += (p.vy || 0) * dt;
        p.vx = (p.vx || 0) * Math.pow(CONFIG.PLAYER_FRICTION, dt * 60);
        p.vy = (p.vy || 0) * Math.pow(CONFIG.PLAYER_FRICTION, dt * 60);
        limitVelocity(p, CONFIG.MAX_PLAYER_SPEED_RATIO_PER_SECOND);
        bounceCircleWalls(p, pr);
      }

      for (const b of boxes) {
        b.x += (b.vx || 0) * dt;
        b.y += (b.vy || 0) * dt;
        b.angle = (b.angle || 0) + (b.av || 0) * dt;
        b.vx = (b.vx || 0) * Math.pow(CONFIG.BOX_FRICTION, dt * 60);
        b.vy = (b.vy || 0) * Math.pow(CONFIG.BOX_FRICTION, dt * 60);
        b.av = (b.av || 0) * Math.pow(CONFIG.BOX_ANGULAR_FRICTION, dt * 60);
        limitVelocity(b, CONFIG.MAX_BOX_SPEED_RATIO_PER_SECOND);
        b.av = clamp(b.av || 0, -CONFIG.MAX_BOX_ANGULAR_SPEED, CONFIG.MAX_BOX_ANGULAR_SPEED);
        bounceBoxWalls(b, bs);
      }

      for (let pass = 0; pass < CONFIG.COLLISION_PASSES; pass++) {
        for (const [, p] of players) {
          if (!p.active || p.ghost) continue;
          for (const b of boxes) collideCircleBox(p, b, pr, bs);
        }

        for (let i = 0; i < boxes.length; i++) {
          for (let j = i + 1; j < boxes.length; j++) collideBoxes(boxes[i], boxes[j], bs);
        }

        for (let i = 0; i < players.length; i++) {
          const [idA, a] = players[i];
          if (!a.active || a.ghost) continue;
          for (let j = i + 1; j < players.length; j++) {
            const [idB, b] = players[j];
            if (!b.active || b.ghost) continue;
            collidePlayers(idA, a, idB, b, pr);
          }
        }
      }
    }

    function limitVelocity(o, max) {
      const s = speed(o);
      if (s <= max || s <= 0.0001) return;
      const scale = max / s;
      o.vx = (o.vx || 0) * scale;
      o.vy = (o.vy || 0) * scale;
    }

    function bounceCircleWalls(p, r) {
      if (p.x < r) { p.x = r; p.vx = Math.abs(p.vx || 0) * CONFIG.PLAYER_RESTITUTION; }
      if (p.x > 1 - r) { p.x = 1 - r; p.vx = -Math.abs(p.vx || 0) * CONFIG.PLAYER_RESTITUTION; }
      if (p.y < r) { p.y = r; p.vy = Math.abs(p.vy || 0) * CONFIG.PLAYER_RESTITUTION; }
      if (p.y > 1 - r) { p.y = 1 - r; p.vy = -Math.abs(p.vy || 0) * CONFIG.PLAYER_RESTITUTION; }
    }

    function bounceBoxWalls(b, s) {
      if (b.x < 0) { b.x = 0; b.vx = Math.abs(b.vx || 0) * CONFIG.BOX_RESTITUTION; }
      if (b.x > 1 - s) { b.x = 1 - s; b.vx = -Math.abs(b.vx || 0) * CONFIG.BOX_RESTITUTION; }
      if (b.y < 0) { b.y = 0; b.vy = Math.abs(b.vy || 0) * CONFIG.BOX_RESTITUTION; }
      if (b.y > 1 - s) { b.y = 1 - s; b.vy = -Math.abs(b.vy || 0) * CONFIG.BOX_RESTITUTION; }
    }

    function collideCircleBox(p, b, r, s) {
      const cx = clamp(p.x, b.x, b.x + s);
      const cy = clamp(p.y, b.y, b.y + s);
      let dx = p.x - cx;
      let dy = p.y - cy;
      let d = hypot(dx, dy);
      if (d >= r) return;
      if (d < 0.0001) {
        const pvx = p.vx || 0;
        const pvy = p.vy || 0;
        const ps = hypot(pvx, pvy);
        if (ps > 0.0001) {
          dx = -pvx / ps;
          dy = -pvy / ps;
        } else {
          dx = p.x < b.x + s / 2 ? -1 : 1;
          dy = 0;
        }
        d = 1;
      }
      const nx = dx / d;
      const ny = dy / d;
      const overlap = r - d;
      const boxShare = CONFIG.BOX_PLAYER_SEPARATION_SHARE;
      p.x += nx * overlap * (1 - boxShare);
      p.y += ny * overlap * (1 - boxShare);
      b.x -= nx * overlap * boxShare;
      b.y -= ny * overlap * boxShare;
      const incoming = Math.max(0, -((p.vx || 0) * nx + (p.vy || 0) * ny));
      b.vx = (b.vx || 0) - nx * incoming * CONFIG.BOX_PUSH_MULTIPLIER;
      b.vy = (b.vy || 0) - ny * incoming * CONFIG.BOX_PUSH_MULTIPLIER;
      const contactX = cx - (b.x + s / 2);
      const contactY = cy - (b.y + s / 2);
      const impulseX = -nx * incoming;
      const impulseY = -ny * incoming;
      const torque = contactX * impulseY - contactY * impulseX;
      b.av = clamp((b.av || 0) + torque * CONFIG.BOX_TORQUE_MULTIPLIER, -CONFIG.MAX_BOX_ANGULAR_SPEED, CONFIG.MAX_BOX_ANGULAR_SPEED);
      p.vx = (p.vx || 0) * CONFIG.PLAYER_BOX_BRAKE;
      p.vy = (p.vy || 0) * CONFIG.PLAYER_BOX_BRAKE;
      bounceBoxWalls(b, s);
    }

    function collideBoxes(a, b, s) {
      if (a.x + s <= b.x || b.x + s <= a.x || a.y + s <= b.y || b.y + s <= a.y) return;
      const ax = a.x + s / 2;
      const ay = a.y + s / 2;
      const bx = b.x + s / 2;
      const by = b.y + s / 2;
      const ox = s - Math.abs(ax - bx);
      const oy = s - Math.abs(ay - by);
      if (ox < oy) {
        const dir = ax < bx ? -1 : 1;
        a.x += dir * ox / 2;
        b.x -= dir * ox / 2;
        const av = a.vx || 0;
        a.vx = (b.vx || 0) * CONFIG.BOX_RESTITUTION;
        b.vx = av * CONFIG.BOX_RESTITUTION;
        a.av = (a.av || 0) + dir * Math.abs(b.vy || 0) * 0.25;
        b.av = (b.av || 0) + dir * Math.abs(a.vy || 0) * 0.25;
      } else {
        const dir = ay < by ? -1 : 1;
        a.y += dir * oy / 2;
        b.y -= dir * oy / 2;
        const av = a.vy || 0;
        a.vy = (b.vy || 0) * CONFIG.BOX_RESTITUTION;
        b.vy = av * CONFIG.BOX_RESTITUTION;
        a.av = (a.av || 0) - dir * Math.abs(b.vx || 0) * 0.25;
        b.av = (b.av || 0) - dir * Math.abs(a.vx || 0) * 0.25;
      }
      a.av = clamp(a.av || 0, -CONFIG.MAX_BOX_ANGULAR_SPEED, CONFIG.MAX_BOX_ANGULAR_SPEED);
      b.av = clamp(b.av || 0, -CONFIG.MAX_BOX_ANGULAR_SPEED, CONFIG.MAX_BOX_ANGULAR_SPEED);
      bounceBoxWalls(a, s);
      bounceBoxWalls(b, s);
    }

    function collidePlayers(idA, a, idB, b, r) {
      let dx = b.x - a.x;
      let dy = b.y - a.y;
      let d = hypot(dx, dy);
      if (d >= r * 2) return;
      if (d < 0.0001) {
        dx = 1; dy = 0; d = 1;
      }
      const nx = dx / d;
      const ny = dy / d;
      const overlap = r * 2 - d;
      a.x -= nx * overlap / 2;
      a.y -= ny * overlap / 2;
      b.x += nx * overlap / 2;
      b.y += ny * overlap / 2;
      const avn = (a.vx || 0) * nx + (a.vy || 0) * ny;
      const bvn = (b.vx || 0) * nx + (b.vy || 0) * ny;
      const impulse = (avn - bvn) * CONFIG.PLAYER_RESTITUTION;
      a.vx = (a.vx || 0) - impulse * nx;
      a.vy = (a.vy || 0) - impulse * ny;
      b.vx = (b.vx || 0) + impulse * nx;
      b.vy = (b.vy || 0) + impulse * ny;
      if (game.phase === "playing" && nowMs() - lastPassAt > CONFIG.PASS_GRACE_SECONDS * 1000) {
        if (game.bombCarrierId === idA) { game.bombCarrierId = idB; lastPassAt = nowMs(); }
        else if (game.bombCarrierId === idB) { game.bombCarrierId = idA; lastPassAt = nowMs(); }
      }
    }

    function explodeCarrier() {
      const id = game.bombCarrierId;
      if (game.players[id]) {
        game.players[id].active = false;
        game.players[id].ghost = true;
        game.players[id].vx = 0;
        game.players[id].vy = 0;
      }
      const alive = Object.entries(game.players).filter(([, p]) => p.active && !p.ghost);
      game.bombCarrierId = alive[Math.floor(Math.random() * alive.length)]?.[0] || "";
      game.fuseEnd = nowMs() + CONFIG.FUSE_DURATION * 1000;
      lastPassAt = nowMs();
    }

    function syncHostState() {
      if (!roomRef) return;
      const slimPlayers = {};
      for (const [id, p] of Object.entries(game.players || {})) {
        slimPlayers[id] = {
          name: p.name,
          index: p.index,
          color: p.color,
          connected: p.connected !== false,
          joinedAt: p.joinedAt || 0,
          ready: p.ready !== false,
          active: p.active !== false,
          ghost: !!p.ghost,
          x: +p.x.toFixed(5),
          y: +p.y.toFixed(5),
          vx: +(p.vx || 0).toFixed(5),
          vy: +(p.vy || 0).toFixed(5),
          lastDashAt: p.lastDashAt || 0
        };
      }
      roomRef.update({
        phase: game.phase,
        round: game.round,
        message: game.message,
        countdownEnd: game.countdownEnd,
        fuseEnd: game.fuseEnd,
        roundResumeAt: game.roundResumeAt,
        winnerId: game.winnerId,
        bombCarrierId: game.bombCarrierId,
        scores: game.scores || {},
        boxes: (game.boxes || []).map(b => ({
          id: b.id,
          x: +b.x.toFixed(5),
          y: +b.y.toFixed(5),
          vx: +(b.vx || 0).toFixed(5),
          vy: +(b.vy || 0).toFixed(5),
          angle: +(b.angle || 0).toFixed(5),
          av: +(b.av || 0).toFixed(5)
        })),
        players: slimPlayers
      });
    }

    function tryDash() {
      if (!drag || !roomCode) return;
      const p = game.players[uid];
      if (!p || !p.active || p.ghost || game.phase !== "playing") return;
      const minLockout = game.bombCarrierId === uid ? CONFIG.CARRIER_LOCKOUT_BONUS : CONFIG.MIN_LOCKOUT;
      const elapsed = (nowMs() - (p.lastDashAt || 0)) / 1000;
      if (elapsed < minLockout || speed(p) * arenaSize > CONFIG.NEAR_ZERO_VELOCITY_THRESHOLD) return;

      const maxDrag = arenaSize * CONFIG.MAX_DRAG_RADIUS_RATIO;
      const dx = clamp(drag.currentX - drag.startX, -maxDrag, maxDrag);
      const dy = clamp(drag.currentY - drag.startY, -maxDrag, maxDrag);
      const dist = Math.min(maxDrag, hypot(dx, dy));
      if (dist < 4) return;
      const power = dist / maxDrag;
      const maxSpeed = CONFIG.MAX_DASH_SPEED_MULTIPLIER * (1 - CONFIG.PLAYER_FRICTION) * 60;
      p.vx = (-dx / Math.max(dist, 1)) * maxSpeed * power;
      p.vy = (-dy / Math.max(dist, 1)) * maxSpeed * power;
      p.lastDashAt = nowMs();
      if (isHost) syncHostState();
      else playerRef.update({ vx: p.vx, vy: p.vy, lastDashAt: p.lastDashAt });
    }

    function canvasPoint(evt) {
      const rect = canvas.getBoundingClientRect();
      const source = evt.touches?.[0] || evt.changedTouches?.[0] || evt;
      return {
        x: source.clientX - rect.left,
        y: source.clientY - rect.top
      };
    }

    function onPointerStart(evt) {
      evt.preventDefault();
      const pt = canvasPoint(evt);
      drag = { startX: pt.x, startY: pt.y, currentX: pt.x, currentY: pt.y };
    }

    function onPointerMove(evt) {
      if (!drag) return;
      evt.preventDefault();
      const pt = canvasPoint(evt);
      drag.currentX = pt.x;
      drag.currentY = pt.y;
    }

    function onPointerEnd(evt) {
      if (!drag) return;
      evt.preventDefault();
      if (evt.changedTouches?.[0]) {
        const pt = canvasPoint(evt);
        drag.currentX = pt.x;
        drag.currentY = pt.y;
      }
      tryDash();
      drag = null;
    }

    function render(dt) {
      const source = game;
      if (isHost) copyInto(renderState, source);
      else interpolateState(renderState, source);
      draw();
      updateRoundText();
      updateCornerTags();
    }

    function interpolateState(target, source) {
      target.phase = source.phase;
      target.round = source.round;
      target.message = source.message;
      target.countdownEnd = source.countdownEnd;
      target.fuseEnd = source.fuseEnd;
      target.roundResumeAt = source.roundResumeAt;
      target.winnerId = source.winnerId;
      target.bombCarrierId = source.bombCarrierId;
      target.scores = source.scores || {};
      for (const [id, p] of Object.entries(source.players || {})) {
        if (!target.players[id]) target.players[id] = { ...p };
        const rp = target.players[id];
        rp.x = rp.x + ((p.x || 0) - (rp.x || 0)) * CONFIG.INTERPOLATION;
        rp.y = rp.y + ((p.y || 0) - (rp.y || 0)) * CONFIG.INTERPOLATION;
        Object.assign(rp, { ...p, x: rp.x, y: rp.y });
      }
      for (const id of Object.keys(target.players)) if (!source.players?.[id]) delete target.players[id];
      target.boxes = (source.boxes || []).map((b, i) => {
        const prev = target.boxes[i] || b;
        return {
          ...b,
          x: prev.x + (b.x - prev.x) * CONFIG.INTERPOLATION,
          y: prev.y + (b.y - prev.y) * CONFIG.INTERPOLATION,
          angle: (prev.angle || 0) + ((b.angle || 0) - (prev.angle || 0)) * CONFIG.INTERPOLATION
        };
      });
    }

    function draw() {
      const w = arenaSize;
      ctx.clearRect(0, 0, w, w);
      drawFloor(w);
      const bs = CONFIG.BOX_SIZE_RATIO * w;
      const pr = CONFIG.PLAYER_RADIUS_RATIO * w;

      for (const b of renderState.boxes || []) {
        const x = b.x * w;
        const y = b.y * w;
        ctx.fillStyle = "#6d7380";
        ctx.strokeStyle = "#171b22";
        ctx.lineWidth = Math.max(2, w * 0.004);
        ctx.save();
        ctx.translate(x + bs / 2, y + bs / 2);
        ctx.rotate(b.angle || 0);
        ctx.fillRect(-bs / 2, -bs / 2, bs, bs);
        ctx.strokeRect(-bs / 2, -bs / 2, bs, bs);
        ctx.beginPath();
        ctx.moveTo(-bs / 2, 0);
        ctx.lineTo(bs / 2, 0);
        ctx.moveTo(0, -bs / 2);
        ctx.lineTo(0, bs / 2);
        ctx.globalAlpha = 0.35;
        ctx.strokeStyle = "#f4f7fb";
        ctx.lineWidth = Math.max(1, w * 0.002);
        ctx.stroke();
        ctx.globalAlpha = 1;
        ctx.restore();
      }

      for (const [id, p] of Object.entries(renderState.players || {})) {
        const x = p.x * w;
        const y = p.y * w;
        ctx.globalAlpha = p.ghost ? 0.32 : 1;
        ctx.beginPath();
        ctx.arc(x, y, pr, 0, Math.PI * 2);
        ctx.fillStyle = p.color || "#ffffff";
        ctx.fill();
        ctx.lineWidth = Math.max(2, w * 0.004);
        ctx.strokeStyle = id === uid ? "#ffffff" : "#111318";
        ctx.stroke();
        if (renderState.bombCarrierId === id && !p.ghost) {
          ctx.beginPath();
          ctx.arc(x, y, pr * 1.55, 0, Math.PI * 2);
          ctx.strokeStyle = "#ff6377";
          ctx.lineWidth = Math.max(3, w * 0.006);
          ctx.stroke();
        }
        ctx.globalAlpha = 1;
      }

      drawCenterTimer(w);
      drawDrag(w);
    }

    function drawFloor(w) {
      const cells = 16;
      const s = w / cells;
      for (let y = 0; y < cells; y++) {
        for (let x = 0; x < cells; x++) {
          ctx.fillStyle = (x + y) % 2 ? "#1a2029" : "#202734";
          ctx.fillRect(x * s, y * s, s, s);
        }
      }
      ctx.strokeStyle = "rgba(255,255,255,0.12)";
      ctx.lineWidth = 1;
      for (let i = 0; i <= cells; i++) {
        ctx.beginPath();
        ctx.moveTo(i * s, 0);
        ctx.lineTo(i * s, w);
        ctx.moveTo(0, i * s);
        ctx.lineTo(w, i * s);
        ctx.stroke();
      }
    }

    function drawCenterTimer(w) {
      let text = "";
      if (renderState.phase === "countdown") text = String(Math.max(0, Math.ceil((renderState.countdownEnd - nowMs()) / 1000)));
      if (renderState.phase === "playing") text = String(Math.max(0, Math.ceil((renderState.fuseEnd - nowMs()) / 1000)));
      if (!text) return;
      ctx.save();
      ctx.globalAlpha = 0.5;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.font = "800 " + Math.floor(w * 0.22) + "px system-ui, sans-serif";
      ctx.fillStyle = renderState.phase === "playing" ? "#ff6377" : "#f4f7fb";
      ctx.fillText(text, w / 2, w / 2);
      ctx.restore();
    }

    function drawDrag(w) {
      if (!drag) return;
      const maxDrag = w * CONFIG.MAX_DRAG_RADIUS_RATIO;
      const dx = drag.currentX - drag.startX;
      const dy = drag.currentY - drag.startY;
      const d = Math.min(maxDrag, hypot(dx, dy));
      if (d <= 1) return;
      const nx = dx / hypot(dx, dy);
      const ny = dy / hypot(dx, dy);
      const cx = drag.startX + nx * d;
      const cy = drag.startY + ny * d;
      ctx.save();
      ctx.strokeStyle = "#71d4ff";
      ctx.fillStyle = "#71d4ff";
      ctx.lineWidth = Math.max(2, w * 0.005);
      ctx.globalAlpha = 0.9;
      ctx.beginPath();
      ctx.arc(drag.startX, drag.startY, maxDrag, 0, Math.PI * 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(drag.startX, drag.startY);
      ctx.lineTo(cx, cy);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(drag.startX, drag.startY);
      ctx.lineTo(drag.startX - nx * d, drag.startY - ny * d);
      ctx.strokeStyle = "#80e18d";
      ctx.stroke();
      ctx.restore();
    }

    function updateHud() {
      const entries = Object.entries(game.players || {}).sort((a, b) => (a[1].index || 0) - (b[1].index || 0));
      scoresEl.innerHTML = "";
      for (let i = 0; i < 4; i++) {
        const entry = entries[i];
        const div = document.createElement("div");
        div.className = "score" + (entry?.[0] === uid ? " me" : "");
        if (entry) {
          const [id, p] = entry;
          div.innerHTML = "<div class='name'></div><div class='points'></div>";
          div.querySelector(".name").textContent = (p.name || "Player") + (id === game.bombCarrierId ? " - bomb" : "");
          div.querySelector(".points").textContent = game.scores?.[id] || 0;
        } else {
          div.innerHTML = "<div class='name'>Open slot</div><div class='points'>-</div>";
        }
        scoresEl.appendChild(div);
      }
    }

    function updateRoundText() {
      if (!roomCode) {
        roundText.textContent = "Waiting for room";
        return;
      }
      const msg = renderState.message || renderState.phase || "Lobby";
      roundText.textContent = "Round " + (renderState.round || 0) + " - " + msg;
      if (renderState.phase === "matchEnd") showWinner();
    }

    function updateCornerTags() {
      const entries = Object.entries(renderState.players || {}).sort((a, b) => (a[1].index || 0) - (b[1].index || 0));
      tags.forEach((tag, i) => {
        const p = entries[i]?.[1];
        tag.textContent = p ? (p.name || "Player") : "";
      });
    }

    function showWinner() {
      const winner = renderState.players[renderState.winnerId]?.name || "Player";
      overlay.style.display = "grid";
      overlay.querySelector("h1").textContent = winner + " wins";
      overlay.querySelector("p").textContent = "Match complete.";
      $("createBtn").textContent = "New room";
      overlayMsg.textContent = "Create or join another room to play again.";
    }

    function loop(ts) {
      const dt = Math.min(0.033, (ts - lastFrame) / 1000 || 0);
      lastFrame = ts;
      hostStep(dt);
      render(dt);
      requestAnimationFrame(loop);
    }

    window.addEventListener("resize", resizeCanvas);
    canvas.addEventListener("mousedown", onPointerStart);
    window.addEventListener("mousemove", onPointerMove, { passive: false });
    window.addEventListener("mouseup", onPointerEnd, { passive: false });
    canvas.addEventListener("touchstart", onPointerStart, { passive: false });
    canvas.addEventListener("touchmove", onPointerMove, { passive: false });
    canvas.addEventListener("touchend", onPointerEnd, { passive: false });
    canvas.addEventListener("touchcancel", onPointerEnd, { passive: false });
    $("createBtn").addEventListener("click", createRoom);
    $("joinBtn").addEventListener("click", () => joinExistingRoom($("joinInput").value, false));
    startBtn.addEventListener("click", startMatchOrRound);

    resizeCanvas();
    updateHud();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
