<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Corner Rush</title>
    <!-- Firebase CDN -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { background: #222; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; touch-action: none; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; display: flex; justify-content: space-between; padding: 10px 20px; pointer-events: none; z-index: 10; }
        #lobby { background: #333; padding: 20px; border-radius: 8px; text-align: center; z-index: 20; }
        #lobby input { padding: 10px; font-size: 16px; margin: 10px; text-transform: uppercase; width: 100px; text-align: center;}
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #e74c3c; color: white; border: none; border-radius: 5px; margin: 5px; }
        #game-container { display: none; position: relative; width: 100vw; height: 100vh; flex-direction: column; align-items: center; justify-content: center; }
        canvas { background: #ecf0f1; box-shadow: 0 0 0 10px #34495e; border-radius: 4px; touch-action: none; }
        #message { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 48px; font-weight: bold; color: #e74c3c; text-shadow: 2px 2px 0 #000; display: none; pointer-events: none; z-index: 15; text-align: center; }
        .hud-text { font-size: 18px; font-weight: bold; background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="lobby">
        <h1>Corner Rush</h1>
        <p>Enter 4-digit code to join, or create a room.</p>
        <input type="text" id="room-code" maxlength="4" placeholder="CODE">
        <br>
        <button onclick="joinRoom()">Join Room</button>
        <button onclick="createRoom()">Create Room</button>
        <p id="lobby-msg" style="color:#ffcc00; margin-top:10px;"></p>
    </div>

    <div id="game-container">
        <div id="ui">
            <div id="room-display" class="hud-text">Room: ----</div>
            <div id="scores-display" class="hud-text">Waiting for players...</div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div id="message"></div>
    </div>

<script>
    // ==========================================
    // CONFIGURATION BLOCK
    // ==========================================
    const CONFIG = {
        FUSE_DURATION: 12,              // Seconds the bomb lasts
        MIN_LOCKOUT: 0.5,               // Base dash cooldown (seconds)
        CARRIER_LOCKOUT_BONUS: 0.3,     // Carrier cooldown bonus (seconds)
        MAX_DRAG_RADIUS_RATIO: 0.2,     // Max drag distance (20% of arena)
        PLAYER_FRICTION: 0.92,          // Velocity multiplier per frame for players
        BOX_FRICTION: 0.85,             // Velocity multiplier for heavy boxes (lower = stops faster)
        NEAR_ZERO_VELOCITY_THRESHOLD: 5,// Pixels per sec to allow next dash
        BOX_SIZE_RATIO: 0.06,           // Box size (6% of arena)
        PLAYER_RADIUS_RATIO: 0.025,     // Player radius (2.5% of arena)
        ROUNDS_TO_WIN: 3,               // Score needed to win match
        SYNC_RATE: 30,                  // Firebase syncs per second
        MAX_DASH_SPEED: 1800            // Base multiplier for max drag
    };

    // ==========================================
    // FIREBASE INITIALIZATION
    // ==========================================
    // REPLACE WITH YOUR FIREBASE CONFIG
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_AUTH_DOMAIN",
        databaseURL: "YOUR_DATABASE_URL",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_STORAGE_BUCKET",
        messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
        appId: "YOUR_APP_ID"
    };
    
    // Initialize standard Firebase logic to run immediately if valid config, else hold.
    let app, auth, db;
    try {
        app = firebase.initializeApp(firebaseConfig);
        auth = firebase.auth();
        db = firebase.database();
        auth.signInAnonymously();
    } catch(e) {
        console.warn("Firebase not configured. Add credentials to play online.");
    }

    // ==========================================
    // GAME STATE & GLOBALS
    // ==========================================
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let myId = null;
    let roomCode = null;
    let isHost = false;
    let arenaSize = 0;
    
    // Local interpolation & state
    let state = { phase: 'lobby', timer: 0, bomb: null, boxes: [], players: {} };
    let scores = {};
    let localInputs = { dragging: false, startX: 0, startY: 0, currentX: 0, currentY: 0, lastDashTime: 0 };
    let playerColors = ['#3498db', '#2ecc71', '#9b59b6', '#f1c40f'];

    // Resize handling (Square arena)
    function resize() {
        let size = Math.min(window.innerWidth, window.innerHeight) * 0.9;
        canvas.width = size;
        canvas.height = size;
        arenaSize = size;
    }
    window.addEventListener('resize', resize);
    resize();

    // ==========================================
    // LOBBY & NETWORKING
    // ==========================================
    function createCode() { return Math.floor(1000 + Math.random() * 9000).toString(); }
    
    auth.onAuthStateChanged(user => { if(user) myId = user.uid; });

    function createRoom() {
        if(!myId) return alert("Connecting...");
        roomCode = createCode();
        isHost = true;
        joinFirebaseRoom(roomCode);
    }

    function joinRoom() {
        if(!myId) return alert("Connecting...");
        let code = document.getElementById('room-code').value.trim().toUpperCase();
        if(code.length === 4) {
            roomCode = code;
            isHost = false;
            joinFirebaseRoom(roomCode);
        }
    }

    function joinFirebaseRoom(code) {
        const roomRef = db.ref('rooms/' + code);
        roomRef.child('players/' + myId).set({ x: arenaSize/2, y: arenaSize/2, color: playerColors[Math.floor(Math.random()*4)], ready: true });
        roomRef.child('players/' + myId).onDisconnect().remove();

        document.getElementById('lobby').style.display = 'none';
        document.getElementById('game-container').style.display = 'flex';
        document.getElementById('room-display').innerText = `Room: ${code}`;

        if(isHost) {
            setupInitialState();
            setInterval(hostPhysicsLoop, 1000 / CONFIG.SYNC_RATE);
        }

        // Listen for sync
        roomRef.child('state').on('value', snap => {
            if(snap.exists()) state = snap.val();
            updateUI();
        });
        
        roomRef.child('scores').on('value', snap => {
            if(snap.exists()) scores = snap.val();
            updateUI();
        });

        // Listen for dash intents from clients (Host only)
        if(isHost) {
            roomRef.child('intents').on('child_added', snap => {
                let intent = snap.val();
                let p = state.players[intent.id];
                if(p && p.alive) {
                    p.vx = intent.vx;
                    p.vy = intent.vy;
                }
                snap.ref.remove();
            });
        }
        
        requestAnimationFrame(render);
    }

    function setupInitialState() {
        state = { phase: 'waiting', timer: 0, bomb: null, boxes: [], players: {} };
        db.ref('rooms/'+roomCode+'/scores').set({});
        resetRound(true);
    }

    function resetRound(fullReset = false) {
        let boxSize = arenaSize * CONFIG.BOX_SIZE_RATIO;
        let margin = boxSize * 1.5;
        let bPositions = [
            // Top Left
            {x: margin, y: margin}, {x: margin + boxSize, y: margin}, {x: margin, y: margin + boxSize},
            // Top Right
            {x: arenaSize-margin, y: margin}, {x: arenaSize-margin-boxSize, y: margin}, {x: arenaSize-margin, y: margin+boxSize},
            // Bottom Left
            {x: margin, y: arenaSize-margin}, {x: margin+boxSize, y: arenaSize-margin}, {x: margin, y: arenaSize-margin-boxSize},
            // Bottom Right
            {x: arenaSize-margin, y: arenaSize-margin}, {x: arenaSize-margin-boxSize, y: arenaSize-margin}, {x: arenaSize-margin, y: arenaSize-margin-boxSize}
        ];
        
        state.boxes = bPositions.map(p => ({ x: p.x, y: p.y, vx: 0, vy: 0 }));
        
        db.ref('rooms/'+roomCode+'/players').once('value', snap => {
            let pData = snap.val() || {};
            let ids = Object.keys(pData);
            if(ids.length < 2 && !fullReset) { state.phase = 'waiting'; return; }
            
            ids.forEach((id, i) => {
                state.players[id] = { 
                    x: arenaSize/2 + Math.cos(i)*100, y: arenaSize/2 + Math.sin(i)*100, 
                    vx: 0, vy: 0, alive: true, color: pData[id].color 
                };
                if(fullReset) db.ref(`rooms/${roomCode}/scores/${id}`).set(0);
            });

            state.bomb = ids[Math.floor(Math.random() * ids.length)];
            state.phase = 'countdown';
            state.timer = 3;
            db.ref('rooms/'+roomCode+'/state').set(state);

            let count = 3;
            let iv = setInterval(() => {
                count--;
                state.timer = count;
                if(count <= 0) {
                    clearInterval(iv);
                    state.phase = 'playing';
                    state.timer = CONFIG.FUSE_DURATION;
                    db.ref('rooms/'+roomCode+'/state').set(state);
                }
            }, 1000);
        });
    }

    // ==========================================
    // INPUT HANDLING (Slingshot)
    // ==========================================
    function handleStart(x, y) {
        if(state.phase !== 'playing' || !state.players[myId]?.alive) return;
        localInputs.dragging = true;
        localInputs.startX = x;
        localInputs.startY = y;
        localInputs.currentX = x;
        localInputs.currentY = y;
    }
    
    function handleMove(x, y) {
        if(localInputs.dragging) {
            localInputs.currentX = x;
            localInputs.currentY = y;
        }
    }

    function handleEnd() {
        if(!localInputs.dragging) return;
        localInputs.dragging = false;
        
        let p = state.players[myId];
        if(!p) return;
        
        let speed = Math.hypot(p.vx, p.vy);
        let lockout = CONFIG.MIN_LOCKOUT - (state.bomb === myId ? CONFIG.CARRIER_LOCKOUT_BONUS : 0);
        let timeSinceDash = (Date.now() - localInputs.lastDashTime) / 1000;
        
        if(timeSinceDash >= lockout && speed < CONFIG.NEAR_ZERO_VELOCITY_THRESHOLD) {
            let dx = localInputs.startX - localInputs.currentX;
            let dy = localInputs.startY - localInputs.currentY;
            let dist = Math.hypot(dx, dy);
            
            if(dist > 0) {
                let maxDrag = arenaSize * CONFIG.MAX_DRAG_RADIUS_RATIO;
                let power = Math.min(dist, maxDrag) / maxDrag; 
                
                let dashVx = (dx / dist) * power * CONFIG.MAX_DASH_SPEED;
                let dashVy = (dy / dist) * power * CONFIG.MAX_DASH_SPEED;
                
                localInputs.lastDashTime = Date.now();
                
                // Send intent to Host via DB
                db.ref(`rooms/${roomCode}/intents`).push({ id: myId, vx: dashVx, vy: dashVy });
            }
        }
    }

    canvas.addEventListener('mousedown', e => handleStart(e.offsetX, e.offsetY));
    canvas.addEventListener('mousemove', e => handleMove(e.offsetX, e.offsetY));
    window.addEventListener('mouseup', handleEnd);
    canvas.addEventListener('touchstart', e => { e.preventDefault(); let r = canvas.getBoundingClientRect(); handleStart(e.touches[0].clientX - r.left, e.touches[0].clientY - r.top); }, {passive: false});
    canvas.addEventListener('touchmove', e => { e.preventDefault(); let r = canvas.getBoundingClientRect(); handleMove(e.touches[0].clientX - r.left, e.touches[0].clientY - r.top); }, {passive: false});
    window.addEventListener('touchend', handleEnd);

    // ==========================================
    // PHYSICS (HOST ONLY)
    // ==========================================
    let lastTime = Date.now();
    function hostPhysicsLoop() {
        if(state.phase !== 'playing') return;
        
        let now = Date.now();
        let dt = (now - lastTime) / 1000;
        lastTime = now;
        
        let pRad = arenaSize * CONFIG.PLAYER_RADIUS_RATIO;
        let bSize = arenaSize * CONFIG.BOX_SIZE_RATIO;
        
        // Bomb Timer
        state.timer -= dt;
        if(state.timer <= 0) {
            state.timer = 0;
            state.players[state.bomb].alive = false;
            checkRoundEnd();
        }

        // Apply friction and move players
        Object.keys(state.players).forEach(id => {
            let p = state.players[id];
            if(!p.alive) return;
            p.vx *= CONFIG.PLAYER_FRICTION;
            p.vy *= CONFIG.PLAYER_FRICTION;
            p.x += p.vx * dt;
            p.y += p.vy * dt;
            
            // Wall collisions
            if(p.x < pRad) { p.x = pRad; p.vx *= -0.5; }
            if(p.x > arenaSize - pRad) { p.x = arenaSize - pRad; p.vx *= -0.5; }
            if(p.y < pRad) { p.y = pRad; p.vy *= -0.5; }
            if(p.y > arenaSize - pRad) { p.y = arenaSize - pRad; p.vy *= -0.5; }
        });

        // Box Physics
        state.boxes.forEach(b => {
            b.vx *= CONFIG.BOX_FRICTION;
            b.vy *= CONFIG.BOX_FRICTION;
            b.x += b.vx * dt;
            b.y += b.vy * dt;
            
            let half = bSize/2;
            if(b.x < half) { b.x = half; b.vx *= -0.5; }
            if(b.x > arenaSize - half) { b.x = arenaSize - half; b.vx *= -0.5; }
            if(b.y < half) { b.y = half; b.vy *= -0.5; }
            if(b.y > arenaSize - half) { b.y = arenaSize - half; b.vy *= -0.5; }
        });

        // Collisions: Player vs Box (Circle vs AABB)
        Object.keys(state.players).forEach(id => {
            let p = state.players[id];
            if(!p.alive) return;
            state.boxes.forEach(b => {
                let testX = Math.max(b.x - bSize/2, Math.min(p.x, b.x + bSize/2));
                let testY = Math.max(b.y - bSize/2, Math.min(p.y, b.y + bSize/2));
                let distX = p.x - testX;
                let distY = p.y - testY;
                let distance = Math.hypot(distX, distY);

                if(distance < pRad) {
                    let overlap = pRad - distance;
                    let nx = distX / distance;
                    let ny = distY / distance;
                    
                    p.x += nx * overlap;
                    p.y += ny * overlap;
                    
                    // Transfer momentum heavily to box, stop player
                    b.vx -= nx * Math.hypot(p.vx, p.vy) * 0.8;
                    b.vy -= ny * Math.hypot(p.vx, p.vy) * 0.8;
                    p.vx *= 0.2;
                    p.vy *= 0.2;
                }
            });
        });

        // Collisions: Player vs Player (Bomb transfer)
        let ids = Object.keys(state.players);
        for(let i=0; i<ids.length; i++) {
            for(let j=i+1; j<ids.length; j++) {
                let p1 = state.players[ids[i]];
                let p2 = state.players[ids[j]];
                if(!p1.alive || !p2.alive) continue;
                
                let dx = p1.x - p2.x;
                let dy = p1.y - p2.y;
                let dist = Math.hypot(dx, dy);
                if(dist < pRad * 2) {
                    // Resolve overlap
                    let overlap = (pRad * 2) - dist;
                    p1.x += (dx/dist) * (overlap/2);
                    p1.y += (dy/dist) * (overlap/2);
                    p2.x -= (dx/dist) * (overlap/2);
                    p2.y -= (dy/dist) * (overlap/2);
                    
                    // Swap bomb
                    if(state.bomb === ids[i]) state.bomb = ids[j];
                    else if(state.bomb === ids[j]) state.bomb = ids[i];
                }
            }
        }
        
        // Sync State
        db.ref('rooms/'+roomCode+'/state').set(state);
    }

    function checkRoundEnd() {
        let aliveIds = Object.keys(state.players).filter(id => state.players[id].alive);
        if(aliveIds.length <= 1) {
            state.phase = 'round_over';
            let winnerId = aliveIds[0];
            if(winnerId) {
                scores[winnerId] = (scores[winnerId] || 0) + 1;
                db.ref('rooms/'+roomCode+'/scores').set(scores);
                if(scores[winnerId] >= CONFIG.ROUNDS_TO_WIN) {
                    state.phase = 'match_over';
                    db.ref('rooms/'+roomCode+'/state').set(state);
                    return;
                }
            }
            db.ref('rooms/'+roomCode+'/state').set(state);
            setTimeout(() => resetRound(false), 3000);
        }
    }

    // ==========================================
    // RENDER (ALL CLIENTS)
    // ==========================================
    function updateUI() {
        let scoreStr = "Scores: ";
        Object.keys(scores).forEach(id => {
            let c = state.players[id]?.color || '#fff';
            scoreStr += `<span style="color:${c}">${scores[id]}</span> `;
        });
        document.getElementById('scores-display').innerHTML = scoreStr;
        
        let msg = document.getElementById('message');
        if(state.phase === 'countdown') { msg.style.display = 'block'; msg.innerText = Math.ceil(state.timer); }
        else if(state.phase === 'round_over') { msg.style.display = 'block'; msg.innerText = "Round Over!"; }
        else if(state.phase === 'match_over') { msg.style.display = 'block'; msg.innerText = "MATCH OVER!"; }
        else { msg.style.display = 'none'; }
    }

    function render() {
        ctx.clearRect(0, 0, arenaSize, arenaSize);
        
        // Grid Floor
        ctx.strokeStyle = "rgba(0,0,0,0.05)";
        ctx.lineWidth = 1;
        for(let i=0; i<arenaSize; i+=40) {
            ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, arenaSize); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(arenaSize, i); ctx.stroke();
        }

        let bSize = arenaSize * CONFIG.BOX_SIZE_RATIO;
        let pRad = arenaSize * CONFIG.PLAYER_RADIUS_RATIO;

        // Draw Boxes
        state.boxes.forEach(b => {
            ctx.fillStyle = "#7f8c8d";
            ctx.strokeStyle = "#2c3e50";
            ctx.lineWidth = 3;
            ctx.fillRect(b.x - bSize/2, b.y - bSize/2, bSize, bSize);
            ctx.strokeRect(b.x - bSize/2, b.y - bSize/2, bSize, bSize);
        });

        // Draw Players
        Object.keys(state.players).forEach(id => {
            let p = state.players[id];
            ctx.globalAlpha = p.alive ? 1 : 0.3;
            ctx.beginPath();
            ctx.arc(p.x, p.y, pRad, 0, Math.PI*2);
            ctx.fillStyle = p.color;
            ctx.fill();
            ctx.lineWidth = 4;
            ctx.strokeStyle = (state.bomb === id && p.alive) ? (Date.now()%300<150 ? '#e74c3c' : '#fff') : '#2c3e50';
            ctx.stroke();
            ctx.globalAlpha = 1.0;
        });

        // Slingshot Preview Line
        if(localInputs.dragging && state.phase === 'playing' && state.players[myId]?.alive) {
            let p = state.players[myId];
            let dx = localInputs.startX - localInputs.currentX;
            let dy = localInputs.startY - localInputs.currentY;
            let dist = Math.hypot(dx, dy);
            let maxDrag = arenaSize * CONFIG.MAX_DRAG_RADIUS_RATIO;
            
            if(dist > 0) {
                let power = Math.min(dist, maxDrag);
                let drawX = p.x + (dx/dist) * power;
                let drawY = p.y + (dy/dist) * power;
                
                ctx.beginPath();
                ctx.moveTo(p.x, p.y);
                ctx.lineTo(drawX, drawY);
                ctx.strokeStyle = "rgba(255, 255, 255, 0.5)";
                ctx.setLineDash([5, 5]);
                ctx.lineWidth = 3;
                ctx.stroke();
                ctx.setLineDash([]);
            }
        }

        // Center Timer
        if(state.phase === 'playing') {
            ctx.fillStyle = "rgba(0,0,0,0.2)";
            ctx.font = "bold " + (arenaSize*0.3) + "px sans-serif";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(Math.ceil(state.timer), arenaSize/2, arenaSize/2);
        }

        requestAnimationFrame(render);
    }
</script>
</body>
</html>
